text: |-
  To achieve the objectives outlined in Specific Aim 1, we will employ a comprehensive and rigorous experimental approach. We will first establish primary neuronal cultures from embryonic day 18 rat hippocampal tissue using well-established protocols previously optimized in our laboratory. Neurons will be cultured on poly-D-lysine-coated coverslips in Neurobasal medium supplemented with B27 and GlutaMAX for 14 days in vitro to ensure mature synaptic development. To investigate the role of BDNF-TrkB signaling in activity-dependent synaptic plasticity, we will utilize a combination of pharmacological and genetic approaches. Specifically, we will treat cultures with recombinant human BDNF at concentrations of 10, 50, and 100 ng/mL for 30 minutes, followed by electrophysiological recordings of miniature excitatory postsynaptic currents using whole-cell patch-clamp techniques. Statistical analyses will be performed using one-way ANOVA with Tukey's post-hoc test for multiple comparisons, with significance set at p < 0.05.
