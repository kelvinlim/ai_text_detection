text: |-
  I started my independent lab in 2016 with an R00 transition award focused on circuit mechanisms of compulsive behavior. That first grant taught me a lot about what I didn't know — my initial aims were way too ambitious and I spent the first two years mostly troubleshooting fiber photometry in the dorsal striatum. But the struggle paid off. We published our first real paper in Neuron in 2019 showing that striatopallidal D2-MSN activity during reward omission was predictive of compulsive-like behavior in our progressive ratio task. Since then, we've built up to an R01-funded lab with two postdocs, three graduate students, and a research technician. I serve on the BRAIN Initiative review panel and I'm an associate editor at Neuropsychopharmacology. The current proposal builds directly on our expertise in striatal circuit dissection and extends it into a disease model we've been developing for two years.
