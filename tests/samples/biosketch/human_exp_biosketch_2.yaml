text: |-
  My training is somewhat unusual for this field. I did my PhD in chemical engineering at MIT working on microfluidic devices, then pivoted to immunology during my postdoc with Dr. Bhatt at Stanford. People sometimes ask why the switch, and the honest answer is that I watched my father go through cancer treatment and realized I wanted to work on something with more direct clinical impact. The engineering background turns out to be incredibly useful though — our lab's main contribution has been developing high-throughput screening platforms for T cell function that nobody else has. We published the CytoScan platform in Nature Methods in 2021 and it's now being used by about 15 labs worldwide. I was promoted to Associate Professor with tenure in 2023. I also co-direct our department's immunoengineering graduate training program, which currently has 12 students from four departments.
