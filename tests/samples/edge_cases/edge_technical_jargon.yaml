text: |-
  Hippocampal slices (400 µm) were prepared from P21-P28 Sprague-Dawley rats using a Leica VT1200S vibratome in ice-cold NMDG-HEPES cutting solution (in mM: 92 NMDG, 2.5 KCl, 1.25 NaH2PO4, 30 NaHCO3, 20 HEPES, 25 glucose, 2 thiourea, 5 Na-ascorbate, 3 Na-pyruvate, 0.5 CaCl2, 10 MgSO4, pH 7.3-7.4 with HCl, 300-310 mOsm). Slices recovered in the same solution at 34°C for 12 min then transferred to room temp ACSF (in mM: 119 NaCl, 2.5 KCl, 1.25 NaH2PO4, 24 NaHCO3, 12.5 glucose, 2 CaCl2, 2 MgSO4). fEPSPs were recorded from stratum radiatum of CA1 using borosilicate glass electrodes (1-3 MΩ) filled with ACSF. Schaffer collaterals were stimulated at 0.05 Hz with a bipolar tungsten electrode. LTP was induced by TBS (5 bursts of 4 pulses at 100 Hz, 200 ms inter-burst interval, repeated 4x at 10 s intervals). We typically get 150-180% potentiation with this protocol.
